<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
<title>2026证券从业资格考试练习</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    max-width: 800px;
    width: 100%;
  }
  header {
    text-align: center;
    color: #fff;
    margin-bottom: 40px;
  }
  header h1 {
    font-size: 32px;
    margin-bottom: 10px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.2);
  }
  header p {
    font-size: 16px;
    opacity: 0.9;
  }
  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    padding: 40px 30px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    color: inherit;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    transition: height 0.3s;
  }
  .card-market::before {
    background: linear-gradient(90deg, #4a5fc1, #764ba2);
  }
  .card-law::before {
    background: linear-gradient(90deg, #e65100, #f57c00);
  }
  .card:hover {
    transform: translateY(-8px);
    box-shadow: 0 30px 80px rgba(0,0,0,0.3);
  }
  .card:hover::before {
    height: 8px;
  }
  .card-icon {
    font-size: 64px;
    margin-bottom: 20px;
    display: block;
  }
  .card h2 {
    font-size: 22px;
    margin-bottom: 12px;
    color: #2c3e50;
  }
  .card-market h2 { color: #4a5fc1; }
  .card-law h2 { color: #e65100; }
  .card p {
    font-size: 14px;
    color: #777;
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .card .badge {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
  }
  .card-market .badge {
    background: #eef1fc;
    color: #4a5fc1;
  }
  .card-law .badge {
    background: #fff3e0;
    color: #e65100;
  }
  .card .stats-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid #f0f0f0;
  }
  .card .stat {
    text-align: center;
  }
  .card .stat-num {
    font-size: 24px;
    font-weight: 800;
    display: block;
  }
  .card-market .stat-num { color: #4a5fc1; }
  .card-law .stat-num { color: #e65100; }
  .card .stat-label {
    font-size: 11px;
    color: #999;
    margin-top: 2px;
  }
  .footer {
    text-align: center;
    margin-top: 40px;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
  }
  .footer a {
    color: rgba(255,255,255,0.9);
    text-decoration: none;
  }
  .footer a:hover { text-decoration: underline; }
  @media (max-width: 600px) {
    .cards { grid-template-columns: 1fr; }
    header h1 { font-size: 24px; }
    .card { padding: 30px 20px; }
    .card-icon { font-size: 48px; }
    .card h2 { font-size: 18px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📚 2026 证券从业资格考试练习</h1>
    <p>选择一个科目开始练习 · 包含单选 / 多选 / 判断三大题型</p>
  </header>

  <div class="cards">
    <a class="card card-market" href="金融市场_练习app.html">
      <span class="card-icon">📈</span>
      <h2>金融市场基础知识</h2>
      <p>金融市场体系、中国金融体系与多层次资本市场、证券市场主体、股票、债券、基金、衍生工具等</p>
      <span class="badge">科目一</span>
      <div class="stats-row">
        <div class="stat">
          <span class="stat-num" id="marketTotal">-</span>
          <span class="stat-label">题目总数</span>
        </div>
        <div class="stat">
          <span class="stat-num" id="marketDone">0</span>
          <span class="stat-label">已完成</span>
        </div>
        <div class="stat">
          <span class="stat-num" id="marketRate">0%</span>
          <span class="stat-label">正确率</span>
        </div>
      </div>
    </a>

    <a class="card card-law" href="法律法规_练习app.html">
      <span class="card-icon">⚖️</span>
      <h2>证券市场基本法律法规</h2>
      <p>公司法、合伙企业法、证券法、基金法、期货法、证券公司管理规范、违法违规行为、从业人员规范等</p>
      <span class="badge">科目二</span>
      <div class="stats-row">
        <div class="stat">
          <span class="stat-num" id="lawTotal">-</span>
          <span class="stat-label">题目总数</span>
        </div>
        <div class="stat">
          <span class="stat-num" id="lawDone">0</span>
          <span class="stat-label">已完成</span>
        </div>
        <div class="stat">
          <span class="stat-num" id="lawRate">0%</span>
          <span class="stat-label">正确率</span>
        </div>
      </div>
    </a>
  </div>

  <div class="footer">
    <p>考试题型：单选 0.5×40 + 多选 1×40 + 判断 1×30 + 综合题 1×10 = 100分 · 120分钟</p>
  </div>
</div>

<script>
// 各科题目总数
const QUIZ_TOTALS = { market: 100, law: 150 };

// 显示题目总数
document.getElementById('marketTotal').textContent = QUIZ_TOTALS.market;
document.getElementById('lawTotal').textContent = QUIZ_TOTALS.law;

// 读取本地存储的答题记录，显示已完成数和正确率
function loadStats(storageKey, doneId, rateId) {
  try {
    const raw = localStorage.getItem(storageKey);
    if (!raw) return;
    const data = JSON.parse(raw);
    const entries = Object.values(data);
    const done = entries.length;
    const correct = entries.filter(e => e.correct).length;
    if (done > 0) {
      document.getElementById(doneId).textContent = done;
      document.getElementById(rateId).textContent = Math.round(correct / done * 100) + '%';
    }
  } catch(e) {}
}

// 金融市场使用的 localStorage key
loadStats('securities_quiz_answers', 'marketDone', 'marketRate');
// 法律法规使用的 localStorage key
loadStats('securities_law_quiz_answers', 'lawDone', 'lawRate');
</script>
</body>
</html>
