<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2026证券从业资格考试练习 · 法律法规</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
    color: #2c3e50;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
  }
  header {
    background: linear-gradient(135deg, #4a5fc1 0%, #5a3f8e 100%);
    color: #fff;
    padding: 30px;
    text-align: center;
  }
  header h1 { font-size: 26px; margin-bottom: 8px; }
  header p { opacity: 0.9; font-size: 14px; }
  .controls {
    padding: 20px 30px;
    background: #f8f9fc;
    border-bottom: 1px solid #e0e4ed;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }
  .controls label { font-size: 13px; color: #555; font-weight: 600; }
  select, button {
    padding: 8px 14px;
    border: 1px solid #cbd2e0;
    border-radius: 8px;
    font-size: 14px;
    background: #fff;
    cursor: pointer;
    transition: all 0.2s;
  }
  button.primary {
    background: #4a5fc1;
    color: #fff;
    border-color: #4a5fc1;
    font-weight: 600;
  }
  button.primary:hover { background: #3a4fb0; }
  button:hover { background: #f0f2f8; }
  .stats {
    margin-left: auto;
    font-size: 13px;
    color: #666;
  }
  .stats span { font-weight: 700; color: #4a5fc1; }
  .quiz-area { padding: 30px; min-height: 400px; }
  .question-meta {
    display: flex;
    justify-content: space-between;
    margin-bottom: 16px;
    font-size: 13px;
    color: #888;
  }
  .q-type-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
  }
  .tag-single { background: #e3f2fd; color: #1565c0; }
  .tag-multi { background: #fff3e0; color: #e65100; }
  .tag-tf { background: #e8f5e9; color: #2e7d32; }
  .question {
    font-size: 17px;
    line-height: 1.7;
    margin-bottom: 20px;
    font-weight: 500;
  }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    padding: 14px 16px;
    border: 2px solid #e0e4ed;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 15px;
    line-height: 1.5;
    user-select: none;
  }
  .option:hover:not(.disabled) { border-color: #4a5fc1; background: #f4f6fd; }
  .option.selected { border-color: #4a5fc1; background: #eef1fc; }
  .option.correct { border-color: #2e7d32; background: #e8f5e9; color: #1b5e20; }
  .option.wrong { border-color: #c62828; background: #ffebee; color: #b71c1c; }
  .option.disabled { cursor: default; }
  .option-letter {
    display: inline-block;
    width: 24px;
    height: 24px;
    line-height: 24px;
    text-align: center;
    background: #e0e4ed;
    border-radius: 50%;
    margin-right: 10px;
    font-weight: 700;
    font-size: 13px;
  }
  .option.selected .option-letter { background: #4a5fc1; color: #fff; }
  .option.correct .option-letter { background: #2e7d32; color: #fff; }
  .option.wrong .option-letter { background: #c62828; color: #fff; }
  .actions {
    margin-top: 24px;
    display: flex;
    gap: 10px;
    justify-content: space-between;
  }
  .actions-right { display: flex; gap: 10px; }
  .explanation {
    margin-top: 20px;
    padding: 16px;
    background: #fffbe6;
    border-left: 4px solid #f5c518;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.7;
    display: none;
  }
  .explanation.show { display: block; }
  .explanation strong { color: #8b6f00; }
  .result-box {
    text-align: center;
    padding: 40px 20px;
  }
  .result-box h2 { font-size: 28px; margin-bottom: 12px; color: #4a5fc1; }
  .result-box .score {
    font-size: 48px;
    font-weight: 800;
    color: #2e7d32;
    margin: 20px 0;
  }
  .progress-bar {
    height: 6px;
    background: #e0e4ed;
    border-radius: 3px;
    overflow: hidden;
    margin: 0 30px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #4a5fc1, #764ba2);
    transition: width 0.3s;
  }
  .footer {
    padding: 16px 30px;
    background: #f8f9fc;
    border-top: 1px solid #e0e4ed;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  .footer-left a {
    color: #555;
    text-decoration: none;
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: color 0.2s;
  }
  .footer-left a:hover { color: #4a5fc1; }
  .footer-left .gh-icon {
    width: 18px; height: 18px; vertical-align: middle;
  }
  .footer-left .star-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border: 1px solid #cbd2e0;
    border-radius: 6px;
    font-size: 13px;
    color: #555;
    text-decoration: none;
    margin-left: 12px;
    transition: all 0.2s;
  }
  .footer-left .star-btn:hover { background: #fff8e1; border-color: #f5c518; color: #8b6f00; }
  .footer-right { display: flex; gap: 8px; flex-wrap: wrap; }
  .footer-right button {
    padding: 5px 12px;
    font-size: 12px;
    border-radius: 6px;
  }
  .save-indicator {
    font-size: 12px;
    color: #2e7d32;
    opacity: 0;
    transition: opacity 0.3s;
    margin-left: 8px;
  }
  .save-indicator.show { opacity: 1; }
  @media (max-width: 600px) {
    .quiz-area { padding: 20px; }
    .controls { padding: 15px; }
    .stats { width: 100%; margin-left: 0; }
    header h1 { font-size: 20px; }
    .footer { padding: 12px 15px; }
    .footer-right button { font-size: 11px; padding: 4px 8px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📚 2026证券从业资格考试练习 · 法律法规</h1>
  </header>

  <div class="controls">
    <label>章节：</label>
    <select id="chapterSelect">
      <option value="all">全部章节</option>
      <option value="1">第一章 证券市场基本法律法规</option>
      <option value="2">第二章 证券经营机构管理规范</option>
      <option value="3">第三章 证券公司业务规范</option>
      <option value="4">第四章 典型违法违规行为</option>
      <option value="5">第五章 行业文化与从业规范</option>
    </select>
    <label>题型：</label>
    <select id="typeSelect">
      <option value="all">全部题型</option>
      <option value="single">单选题</option>
      <option value="multi">多选题</option>
      <option value="tf">判断题</option>
    </select>
    <button class="primary" onclick="startQuiz()">🔄 开始/重置</button>
    <button onclick="toggleOrder()">🔀 <span id="orderLabel">顺序</span></button>
    <div class="stats">
      进度：<span id="progress">0</span> / <span id="total">0</span>
      正确率：<span id="accuracy">0</span>%

  </div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  <div class="quiz-area" id="quizArea"></div>

  <div class="footer">
    <div class="footer-left">
      <a href="https://github.com/ZW471" target="_blank" rel="noopener">
        <svg class="gh-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        ZW471/securities-exam-practice
      </a>
      <a class="star-btn" href="https://github.com/ZW471/securities-exam-practice" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"/></svg>
        Star
      </a>
      <span class="save-indicator" id="saveIndicator">已自动保存</span>
    </div>
    <div class="footer-right">
      <button onclick="exportAnswers()" title="导出答题记录为JSON文件">📤 导出记录</button>
      <button onclick="document.getElementById('importFile').click()" title="导入答题记录JSON文件">📥 导入记录</button>
      <button onclick="clearSavedData()" title="清除所有本地保存的答题数据">🗑️ 清除记录</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importAnswers(event)">
    </div>
  </div>
</div>

<script>
// ============ 题库 ============
const questionBank = [
  // ===== 第一章 证券市场基本法律法规 (Q1-Q60) =====
  // 公司法 (Q1-Q15)
  {ch:1, type:'single', q:'有限责任公司的股东人数上限为（  ）。', opts:['A. 20人','B. 30人','C. 50人','D. 200人'], ans:[2], exp:'有限责任公司股东人数为1-50人。'},
  {ch:1, type:'single', q:'股份有限公司的发起人人数不得超过（  ）。', opts:['A. 50人','B. 100人','C. 200人','D. 300人'], ans:[2], exp:'设立股份有限公司，应当有1人以上200人以下为发起人，其中须有半数以上的发起人在中国境内有住所。'},
  {ch:1, type:'single', q:'股份有限公司董事会成员人数为（  ）。', opts:['A. 3-13人','B. 5-19人','C. 5-17人','D. 3-19人'], ans:[1], exp:'股份有限公司设董事会，成员为5-19人。有限责任公司设董事会，成员为3-13人。'},
  {ch:1, type:'single', q:'监事会中职工代表的比例不得低于（  ）。', opts:['A. 1/4','B. 1/3','C. 1/2','D. 2/3'], ans:[1], exp:'监事会应当包括职工代表，其比例不得低于三分之一。'},
  {ch:1, type:'single', q:'公司以超过股票票面金额的发行价格发行股份所得的溢价款应当列为公司的（  ）。', opts:['A. 资本公积金','B. 任意公积金','C. 股本溢价','D. 法定公积金'], ans:[0], exp:'公司以超过股票票面金额的发行价格发行股份所得的溢价款、发行无面额股份所得股款未计入注册资本的金额以及国务院财政部门规定列入资本公积金的其他项目，应当列为公司资本公积金。'},
  {ch:1, type:'multi', q:'下列属于公司高级管理人员的有（  ）。', opts:['A. 经理','B. 副经理','C. 财务负责人','D. 监事长'], ans:[0,1,2], exp:'高级管理人员是指公司的经理、副经理、财务负责人，上市公司董事会秘书和公司章程规定的其他人员。监事长属于监事会成员。'},
  {ch:1, type:'tf', q:'有限责任公司的公司章程应当载明设立方式。', opts:['A. 正确','B. 错误'], ans:[1], exp:'设立方式不属于有限责任公司章程必须载明的事项，它是股份有限公司章程需要载明的事项（如发起设立或募集设立）。'},
  {ch:1, type:'single', q:'国有独资公司、国有控股公司、国有参股公司是按照（  ）标准进行划分。', opts:['A. 国有出资比例','B. 股东出资方式','C. 投资者出资额','D. 注册方式'], ans:[0], exp:'依公司是否有国有资本及其所占比重，可分为国有独资公司、国有控股公司、国有参股公司、非国有公司等。'},
  {ch:1, type:'single', q:'虚报注册资本的，由公司登记机关处以虚报注册资金额（  ）的罚款。', opts:['A. 1%-10%','B. 5%-15%','C. 10%-20%','D. 5%-10%'], ans:[1], exp:'虚报注册资本的，由公司登记机关责令改正，处以虚报注册金额5%-15%的罚款。'},
  {ch:1, type:'single', q:'欺诈取得公司登记，情节严重的，（  ）。', opts:['A. 责令改正','B. 吊销营业执照','C. 罚款5-200万','D. 以上都是'], ans:[1], exp:'欺诈取得公司登记，情节严重的，吊销营业执照，并对责任人处以3-30万罚款。'},
  {ch:1, type:'multi', q:'公司章程应当载明的事项包括（  ）。', opts:['A. 公司名称和住所','B. 公司经营范围','C. 公司注册资本','D. 公司法定代表人'], ans:[0,1,2,3], exp:'以上均为有限责任公司章程应当载明的事项。'},
  {ch:1, type:'single', q:'有限责任公司股东向股东以外的人转让股权，应当经其他股东过半数同意。其他股东不同意的，不同意的股东应当（  ）。', opts:['A. 放弃优先购买权','B. 购买该转让的股权','C. 书面通知公司','D. 申请仲裁'], ans:[1], exp:'不同意转让的股东应当购买该转让的股权，不购买的视为同意转让。'},
  {ch:1, type:'tf', q:'公司分配当年税后利润时，应当提取利润的20%列入公司法定公积金。', opts:['A. 正确','B. 错误'], ans:[1], exp:'公司分配当年税后利润时，应当提取利润的10%列入公司法定公积金。公司法定公积金累计额为公司注册资本的50%以上的，可以不再提取。'},
  {ch:1, type:'single', q:'抽逃出资的，由公司登记机关处以所抽逃出资金额（  ）的罚款。', opts:['A. 1%-10%','B. 3%-15%','C. 5%-15%','D. 5%-10%'], ans:[2], exp:'抽逃出资的，由公司登记机关责令改正，处以所抽逃出资金额5%-15%的罚款，对直接负责的主管人员和其他直接责任人员处以3-30万元罚款。'},
  {ch:1, type:'multi', q:'下列不属于公司高级管理人员的有（  ）。', opts:['A. 副董事长','B. 监事长','C. 人力资源负责人','D. 财务负责人'], ans:[0,1,2], exp:'高级管理人员是指公司的经理、副经理、财务负责人，上市公司董事会秘书和公司章程规定的其他人员。副董事长属于董事会成员，监事长属于监事会成员。'},

  // 合伙企业法 (Q16-Q25)
  {ch:1, type:'single', q:'有限合伙企业的合伙人人数为（  ）。', opts:['A. 2人以上','B. 2-50名','C. 2-200名','D. 1-50名'], ans:[1], exp:'有限合伙企业由2-50名合伙人设立，至少应当有1名普通合伙人。'},
  {ch:1, type:'single', q:'有限合伙企业由（  ）执行合伙事务。', opts:['A. 全体合伙人','B. 有限合伙人','C. 普通合伙人','D. 合伙人会议'], ans:[2], exp:'有限合伙企业由普通合伙人执行合伙事务。有限合伙人不执行合伙事务，不得对外代表有限合伙企业。'},
  {ch:1, type:'multi', q:'合伙企业解散的事由包括（  ）。', opts:['A. 合伙期限届满，合伙人决定不再经营','B. 全体合伙人决定解散','C. 合伙人已不具备法定人数满30天','D. 合伙协议约定的解散事由出现'], ans:[0,1,2,3], exp:'以上均为合伙企业应当解散的法定情形。'},
  {ch:1, type:'tf', q:'有限合伙企业仅剩有限合伙人的，应当解散。', opts:['A. 正确','B. 错误'], ans:[0], exp:'有限合伙企业仅剩有限合伙人的，应当解散；仅剩普通合伙人的，转为普通合伙企业。'},
  {ch:1, type:'single', q:'合伙企业的清算人应当自被确定之日起（  ）内将清算事由通知债权人。', opts:['A. 10日','B. 15日','C. 20日','D. 30日'], ans:[0], exp:'清算人应当自被确定之日起10日内将合伙企业解散事项通知债权人，并于60日内在报纸上公告。'},
  {ch:1, type:'tf', q:'普通合伙人转变为有限合伙人的，对其作为普通合伙人期间的债务承担无限连带责任。', opts:['A. 正确','B. 错误'], ans:[0], exp:'普通合伙人转变为有限合伙人的，对其作为普通合伙人期间合伙企业发生的债务承担无限连带责任。'},
  {ch:1, type:'single', q:'合伙企业注销后，原普通合伙人对合伙企业存续期间的债务（  ）。', opts:['A. 不再承担责任','B. 仍应承担无限连带责任','C. 以出资额为限','D. 承担有限责任'], ans:[1], exp:'合伙企业注销后，原普通合伙人对合伙企业存续期间的债务仍应承担无限连带责任。'},
  {ch:1, type:'multi', q:'根据合伙人对合伙企业债务承担责任的不同，合伙企业可分为（  ）。', opts:['A. 有限合伙企业','B. 普通合伙企业','C. 人合合伙企业','D. 资合合伙企业'], ans:[0,1], exp:'根据合伙人对合伙企业债务承担责任的不同，合伙企业可分为普通合伙企业和有限合伙企业。'},
  {ch:1, type:'single', q:'新合伙人入伙，除合伙协议另有约定外，应当经（  ）同意。', opts:['A. 全体合伙人一致','B. 过半数合伙人','C. 三分之二以上合伙人','D. 执行事务合伙人'], ans:[0], exp:'新合伙人入伙，除合伙协议另有约定外，应当经全体合伙人一致同意，并依法订立书面入伙协议。'},
  {ch:1, type:'tf', q:'有限合伙人可以对外代表有限合伙企业。', opts:['A. 正确','B. 错误'], ans:[1], exp:'有限合伙人不执行合伙事务，不得对外代表有限合伙企业。'},

  {ch:5, type:'single', q:'持续从事证券业务10年以上且无违法失信的从业人员，可减少（  ）学时。', opts:['A. 3','B. 5','C. 8','D. 10'], ans:[1], exp:'持续从事证券业务10年以上且无违法失信的从业人员，可减少5学时。'},
  {ch:5, type:'tf', q:'证券公司的从业人员可以通过实施股权激励计划持有本公司股票。', opts:['A. 正确','B. 错误'], ans:[0], exp:'实施股权激励计划或者员工持股计划的证券公司的从业人员，可以按照规定持有、卖出本公司股票。'},
  {ch:5, type:'single', q:'私募资管业务人员递延支付年限原则上不少于（  ）年，递延金额不少于（  ）。', opts:['A. 2年，30%','B. 3年，40%','C. 3年，50%','D. 5年，40%'], ans:[1], exp:'私募资管业务人员递延支付年限原则上不少于3年，递延金额不少于40%。'},
  {ch:5, type:'single', q:'证券基金经营机构董事长、高管离任审计应自离任之日起（  ）个月内完成。', opts:['A. 1','B. 2','C. 3','D. 6'], ans:[1], exp:'应当进行审计，并自其离任之日起2个月内将离任审计报告向中国证监会相关派出机构报告。'},
];

// ============ 持久化存储 ============
const STORAGE_KEY = 'securities_law_quiz_answers';

// 为每道题生成唯一ID（基于章节+题型+题目前20字）
function questionId(q) {
  return `ch${q.ch}_${q.type}_${q.q.substring(0, 20)}`;
}

function loadSavedData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveAnswerRecord(q, selectedArr, isCorrect) {
  const data = loadSavedData();
  data[questionId(q)] = {
    selected: selectedArr,
    correct: isCorrect,
    timestamp: Date.now()
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  flashSaveIndicator();
}

function getSavedAnswer(q) {
  const data = loadSavedData();
  return data[questionId(q)] || null;
}

function flashSaveIndicator() {
  const el = document.getElementById('saveIndicator');
  if (!el) return;
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), 2000);
}

function exportAnswers() {
  const data = loadSavedData();
  if (Object.keys(data).length === 0) {
    alert('当前没有答题记录可导出');
    return;
  }
  const exportObj = {
    app: '证券市场基本法律法规练习App',
    exportTime: new Date().toISOString(),
    totalRecords: Object.keys(data).length,
    answers: data
  };
  const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `法律法规练习记录_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importAnswers(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      const answers = imported.answers || imported;
      if (typeof answers !== 'object') throw new Error('格式错误');
      const existing = loadSavedData();
      const merged = { ...existing, ...answers };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(merged));
      const newCount = Object.keys(answers).length;
      alert(`导入成功！共导入 ${newCount} 条记录（已与现有记录合并）`);
      startQuiz(); // 刷新显示
    } catch (err) {
      alert('导入失败：文件格式不正确。请使用本应用导出的 JSON 文件。');
    }
  };
  reader.readAsText(file);
  event.target.value = ''; // 允许重复导入同一文件
}

function clearSavedData() {
  if (!confirm('确定清除所有本地答题记录？此操作不可恢复。')) return;
  localStorage.removeItem(STORAGE_KEY);
  alert('答题记录已清除');
  startQuiz();
}

// ============ 状态 ============
let state = {
  questions: [],
  index: 0,
  answered: [],
  userSelections: [],  // 记录每题用户选的选项
  selected: new Set(),
  correct: 0,
  random: false,
};

// ============ 初始化 ============
function filterQuestions() {
  const ch = document.getElementById('chapterSelect').value;
  const tp = document.getElementById('typeSelect').value;
  let list = questionBank.filter(q => {
    if (ch !== 'all' && q.ch != ch) return false;
    if (tp !== 'all' && q.type !== tp) return false;
    return true;
  });
  if (state.random) list = [...list].sort(() => Math.random() - 0.5);
  return list;
}

function startQuiz() {
  state.questions = filterQuestions();
  state.index = 0;
  state.answered = new Array(state.questions.length).fill(false);
  state.userSelections = new Array(state.questions.length).fill(null);
  state.selected = new Set();
  state.correct = 0;

  // 恢复已保存的答题记录
  const saved = loadSavedData();
  state.questions.forEach((q, i) => {
    const record = saved[questionId(q)];
    if (record) {
      state.answered[i] = true;
      state.userSelections[i] = record.selected;
      if (record.correct) state.correct++;
    }
  });

  document.getElementById('total').textContent = state.questions.length;
  renderQuestion();
}

function toggleOrder() {
  state.random = !state.random;
  document.getElementById('orderLabel').textContent = state.random ? '随机' : '顺序';
  startQuiz();
}

// ============ 渲染 ============
function renderQuestion() {
  const area = document.getElementById('quizArea');
  if (state.questions.length === 0) {
    area.innerHTML = '<div class="result-box"><h2>😕 无可用题目</h2><p>请调整筛选条件</p></div>';
    updateStats();
    return;
  }
  if (state.index >= state.questions.length) {
    renderResult();
    return;
  }
  const q = state.questions[state.index];
  const typeMap = {single: ['单选题','tag-single'], multi: ['多选题','tag-multi'], tf: ['判断题','tag-tf']};
  const [typeLabel, typeClass] = typeMap[q.type];
  const chMap = {1:'第一章',2:'第二章',3:'第三章',4:'第四章',5:'第五章'};
  const letters = ['A','B','C','D','E'];

  state.selected = new Set();
  const alreadyAnswered = state.answered[state.index];
  const savedSelection = state.userSelections[state.index];

  area.innerHTML = `
    <div class="question-meta">
      <span><span class="q-type-tag ${typeClass}">${typeLabel}</span> ${chMap[q.ch]}</span>
      <span>第 ${state.index + 1} / ${state.questions.length} 题</span>
    </div>
    <div class="question">${state.index + 1}. ${q.q}</div>
    <div class="options" id="optionsList">
      ${q.opts.map((o, i) => `
        <div class="option" data-idx="${i}" onclick="selectOption(${i})">
          <span class="option-letter">${letters[i]}</span>${o}
        </div>
      `).join('')}
    </div>
    <div class="explanation" id="explanation">
      <strong>【答案】</strong>${q.ans.map(i => letters[i]).join('')}<br>
      <strong>【解析】</strong>${q.exp}
    </div>
    <div class="actions">
      <button onclick="prevQuestion()" ${state.index === 0 ? 'disabled' : ''}>← 上一题</button>
      <div class="actions-right">
        <button id="submitBtn" class="primary" onclick="submitAnswer()">提交答案</button>
        <button onclick="nextQuestion()">下一题 →</button>
      </div>
    </div>
  `;

  // 如果此题已有保存记录，恢复显示
  if (alreadyAnswered && savedSelection) {
    const correctSet = new Set(q.ans);
    const selSet = new Set(savedSelection);
    document.querySelectorAll('.option').forEach((el, idx) => {
      el.classList.add('disabled');
      if (correctSet.has(idx)) el.classList.add('correct');
      else if (selSet.has(idx)) el.classList.add('wrong');
    });
    document.getElementById('explanation').classList.add('show');
    document.getElementById('submitBtn').disabled = true;
  }
  updateStats();
}

function selectOption(i) {
  if (state.answered[state.index]) return;
  const q = state.questions[state.index];
  if (q.type === 'multi') {
    if (state.selected.has(i)) state.selected.delete(i);
    else state.selected.add(i);
  } else {
    state.selected.clear();
    state.selected.add(i);
  }
  document.querySelectorAll('.option').forEach((el, idx) => {
    el.classList.toggle('selected', state.selected.has(idx));
  });
}

function submitAnswer() {
  if (state.selected.size === 0) {
    alert('请先选择答案');
    return;
  }
  const q = state.questions[state.index];
  const correctSet = new Set(q.ans);
  const selected = state.selected;
  const isCorrect = correctSet.size === selected.size && [...correctSet].every(x => selected.has(x));

  if (!state.answered[state.index]) {
    state.answered[state.index] = true;
    state.userSelections[state.index] = [...selected];
    if (isCorrect) state.correct++;
    saveAnswerRecord(q, [...selected], isCorrect);
  }

  document.querySelectorAll('.option').forEach((el, idx) => {
    el.classList.add('disabled');
    el.classList.remove('selected');
    if (correctSet.has(idx)) el.classList.add('correct');
    else if (selected.has(idx)) el.classList.add('wrong');
  });
  document.getElementById('explanation').classList.add('show');
  document.getElementById('submitBtn').disabled = true;
  updateStats();
}

function nextQuestion() {
  state.index++;
  renderQuestion();
}

function prevQuestion() {
  if (state.index > 0) {
    state.index--;
    renderQuestion();
  }
}

function updateStats() {
  document.getElementById('progress').textContent = state.index + 1 > state.questions.length ? state.questions.length : state.index + 1;
  const answeredCount = state.answered.filter(x => x).length;
  const acc = answeredCount === 0 ? 0 : Math.round(state.correct / answeredCount * 100);
  document.getElementById('accuracy').textContent = acc;
  const fill = state.questions.length === 0 ? 0 : (state.index + 1) / state.questions.length * 100;
  document.getElementById('progressFill').style.width = Math.min(fill, 100) + '%';
}

function renderResult() {
  const area = document.getElementById('quizArea');
  const total = state.questions.length;
  const score = Math.round(state.correct / total * 100);
  let emoji = '🎉', comment = '太棒了！继续保持！';
  if (score < 60) { emoji = '💪'; comment = '需要再加油，重点复习错题！'; }
  else if (score < 80) { emoji = '👍'; comment = '不错，再接再厉！'; }
  area.innerHTML = `
    <div class="result-box">
      <h2>${emoji} 练习完成</h2>
      <div class="score">${score}分</div>
      <p>共 ${total} 题，答对 ${state.correct} 题</p>
      <p style="margin-top:10px;color:#888;">${comment}</p>
      <button class="primary" style="margin-top:24px;padding:12px 30px;font-size:15px;" onclick="startQuiz()">🔄 再练一次</button>
    </div>
  `;
  document.getElementById('progressFill').style.width = '100%';
}

// 启动
startQuiz();
</script>
